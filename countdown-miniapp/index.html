<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown App</title>
    <style>
        body {
            background-color: #9e9c9c;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #898989;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 1em;
            color: chartreuse;
        }

        h2 {
            font-size: 1.5em;
            margin-bottom: 1em;
        }

        #countdown {
            display: flex;
            justify-content: space-around;
        }

        #countdown div {
            padding: 30px;
            border-radius: 6px;
            background-color: #b7b7b7;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        span {
            font-size: xx-large;
        }

        .progress-container {
            background: wheat;
            width: 100%;
            height: 10px;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        #progress-bar {
            background: chartreuse;
            width: 0%;
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease-in-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- timer heading
        day/hr/min/sec blocks
        progress heading
        progress bar -->

        <h1>Countdown Timer</h1>

        <div id="countdown">
            <div><span id="days">00</span>Days</div>
            <div><span id="hours">00</span>Hours</div>
            <div><span id="minutes">00</span>Minutes</div>
            <div><span id="seconds">00</span>Seconds</div>
        </div>

        <h2>Progress:</h2>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
